name: Production - Build and Push Docker Image

on:
  workflow_dispatch:
  release:
    types: [released, prereleased]

env:
  # dummy database url for build time --> prisma
  DATABASE_URL: file:./dev.db

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies for backend
        run: yarn install && yarn run prisma-generate

      - name: Run tests for backend
        run: yarn test

  build-amd64:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ needs.test.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image (amd64)
        uses: docker/build-push-action@v4
        with:
          context: ./
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION_ARG=${{ github.ref_name }}
          tags: |
            aetherixcode/quickstack:${{ github.ref_name }}-amd64
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  build-arm64:
    runs-on: ubuntu-24.04-arm
    needs: test
    if: ${{ needs.test.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image (arm64)
        uses: docker/build-push-action@v4
        with:
          context: ./
          push: true
          platforms: linux/arm64
          build-args: |
            VERSION_ARG=${{ github.ref_name }}
          tags: |
            aetherixcode/quickstack:${{ github.ref_name }}-arm64
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  merge-manifests:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag aetherixcode/quickstack:latest \
            --tag aetherixcode/quickstack:${{ github.ref_name }} \
            aetherixcode/quickstack:${{ github.ref_name }}-amd64 \
            aetherixcode/quickstack:${{ github.ref_name }}-arm64
